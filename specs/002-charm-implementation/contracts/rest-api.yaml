components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: API key provided in the format `Api-Key <key>`.

  schemas:
    Status:
      type: object
      required:
        - db_config_version
        - applied_config_version
        - last_reload
        - last_reload_ok
        - unit
      properties:
        db_config_version:
          type: integer
          description: Current configuration version in the database.
        applied_config_version:
          type: integer
          description: Configuration version currently applied on this unit.
        last_reload:
          type: string
          format: date-time
          description: Timestamp of the last Squid reload attempt.
        last_reload_ok:
          type: boolean
          description: Whether the last reload was successful.
        unit:
          type: string
          description: Juju unit identifier (e.g., squid-as-a-service/1).

    BaseResource:
      type: object
      required:
        - id
        - service
        - name
        - key_prefix
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the resource.
        service:
          type: string
          description: Service label for isolation and attribution.
          pattern: '^[a-zA-Z0-9_-]+$'
        name:
          type: string
          description: Unique name within the service namespace.
          pattern: '^[a-zA-Z0-9_-]+$'
          maxLength: 63
        key_prefix:
          type: string
          description: First 8 characters of the API key used to create the resource, for audit purposes.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the resource was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the resource was last updated.

    SourceACL:
      allOf:
        - $ref: '#/components/schemas/BaseResource'
        - type: object
          required:
            - cidr
          properties:
            cidr:
              type: array
              items:
                type: string
                description: Valid IPv4 or IPv6 CIDR notation (e.g., 10.0.0.0/24, 2001:db8::/32).

    SourceACLInput:
      type: object
      required:
        - name
        - cidr
      properties:
        name:
          type: string
          description: Unique name within the service namespace.
          pattern: '^[a-zA-Z0-9_-]+$'
          maxLength: 63
        cidr:
          type: array
          items:
            type: string
            description: Valid IPv4 or IPv6 CIDR notation.

    SourceGroup:
      allOf:
        - $ref: '#/components/schemas/BaseResource'
        - type: object
          required:
            - sources
          properties:
            sources:
              type: array
              items:
                type: string
                format: uuid
              description: IDs of SourceACL resources belonging to this group.

    SourceGroupInput:
      type: object
      required:
        - name
        - sources
      properties:
        name:
          type: string
          description: Unique name within the service namespace.
          pattern: '^[a-zA-Z0-9_-]+$'
          maxLength: 63
        sources:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of SourceACL resources to include in this group.

    DestinationConfig:
      allOf:
        - $ref: '#/components/schemas/BaseResource'
        - type: object
          required:
            - dst
            - type
          properties:
            dst:
              type: string
              description: Valid domain, wildcard subdomain (leading `.`), or CIDR block.
            type:
              type: string
              enum: [ALLOW, DENY, CONNECT]
            ports:
              type: array
              items:
                type: integer
                minimum: 1
                maximum: 65535
              description: Explicit port list. Defaults to [80] for ALLOW/DENY and [443] for CONNECT if not provided.
            port_groups:
              type: array
              items:
                type: string
                format: uuid
              description: IDs of PortGroup resources; merged with `ports` at render time.

    DestinationConfigInput:
      type: object
      required:
        - name
        - dst
        - type
      properties:
        name:
          type: string
          description: Unique name within the service namespace.
          pattern: '^[a-zA-Z0-9_-]+$'
          maxLength: 63
        dst:
          type: string
          description: Valid domain, wildcard subdomain (leading `.`), or CIDR block.
        type:
          type: string
          enum: [ALLOW, DENY, CONNECT]
        ports:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 65535
          description: Explicit port list.
        port_groups:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of PortGroup resources; merged with `ports` at render time.

    DestinationGroup:
      allOf:
        - $ref: '#/components/schemas/BaseResource'
        - type: object
          required:
            - destinations
          properties:
            destinations:
              type: array
              items:
                type: string
                format: uuid
              description: IDs of DestinationConfig resources belonging to this group.

    DestinationGroupInput:
      type: object
      required:
        - name
        - destinations
      properties:
        name:
          type: string
          description: Unique name within the service namespace.
          pattern: '^[a-zA-Z0-9_-]+$'
          maxLength: 63
        destinations:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of DestinationConfig resources to include in this group.

    PortGroup:
      allOf:
        - $ref: '#/components/schemas/BaseResource'
        - type: object
          required:
            - ports
          properties:
            ports:
              type: array
              items:
                type: integer
                minimum: 1
                maximum: 65535
              description: Port numbers in the range 1–65535.

    PortGroupInput:
      type: object
      required:
        - name
        - ports
      properties:
        name:
          type: string
          description: Unique name within the service namespace.
          pattern: '^[a-zA-Z0-9_-]+$'
          maxLength: 63
        ports:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 65535
          description: Port numbers in the range 1–65535.

    ACLRule:
      allOf:
        - $ref: '#/components/schemas/BaseResource'
        - type: object
          required:
            - priority
            - src_xor_src_group
            - dst_xor_dst_group
          properties:
            priority:
              type: integer
              default: 100
              description: Determines the position of this rule in the rendered Squid config. Lower values are evaluated first.
            src:
              type: string
              format: uuid
              nullable: true
              description: ID of a SourceACL resource. Exactly one of `src` or `src_group` must be set.
            src_group:
              type: string
              format: uuid
              nullable: true
              description: ID of a SourceGroup resource. Exactly one of `src` or `src_group` must be set.
            dst:
              type: string
              format: uuid
              nullable: true
              description: ID of a DestinationConfig resource. Exactly one of `dst` or `dst_group` must be set.
            dst_group:
              type: string
              format: uuid
              nullable: true
              description: ID of a DestinationGroup resource. Exactly one of `dst` or `dst_group` must be set.

    ACLRuleInput:
      type: object
      required:
        - src_xor_src_group
        - dst_xor_dst_group
      properties:
        priority:
          type: integer
          default: 100
          description: Determines the position of this rule in the rendered Squid config. Lower values are evaluated first.
        src:
          type: string
          format: uuid
          nullable: true
          description: ID of a SourceACL resource. Exactly one of `src` or `src_group` must be set.
        src_group:
          type: string
          format: uuid
          nullable: true
          description: ID of a SourceGroup resource. Exactly one of `src` or `src_group` must be set.
        dst:
          type: string
          format: uuid
          nullable: true
          description: ID of a DestinationConfig resource. Exactly one of `dst` or `dst_group` must be set.
        dst_group:
          type: string
          format: uuid
          nullable: true
          description: ID of a DestinationGroup resource. Exactly one of `dst` or `dst_group` must be set.

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable description of the error.
        field_errors:
          type: object
          additionalProperties:
            type: string
          description: Map of field names to error messages. Required for 400 responses, optional for others.