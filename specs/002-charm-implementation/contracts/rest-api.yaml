openapi: 3.1.0
info:
  title: Terrasquid API
  description: REST API for the Terrasquid (Squid-as-a-Service) charm, consumed by the Terraform provider.
  version: 1.0.0

servers:
  - url: https://squid-as-a-service.is.canonical.com/api/v1
    description: Production server

security:
  - apiKeyAuth: []

paths:
  /status/:
    get:
      summary: Get unit status
      description: Unauthenticated endpoint returning the current sync state of the responding unit.
      security: []
      responses:
        '200':
          description: Unit status retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'

  /sources/:
    get:
      summary: List source ACLs
      description: Returns all source ACLs belonging to the authenticated caller's service label.
      responses:
        '200':
          description: A list of source ACLs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SourceACL'
    post:
      summary: Create a source ACL
      description: Creates a new source ACL. If a resource with the same `(service, name)` exists, returns the existing resource with HTTP 200.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourceACLInput'
      responses:
        '201':
          description: Source ACL created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceACL'
        '200':
          description: Source ACL already exists (de-duplication).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceACL'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Squid configuration validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sources/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Retrieve a source ACL
      description: Returns the full source ACL matching the provider's service label, or HTTP 404 if not found.
      responses:
        '200':
          description: Source ACL retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceACL'
        '404':
          description: Source ACL not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update a source ACL
      description: Updates the source ACL, re-validates the resulting Squid config, and returns the updated resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourceACLInput'
      responses:
        '200':
          description: Source ACL updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceACL'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Source ACL not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Squid configuration validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a source ACL
      description: Removes the source ACL, triggers config re-render, and returns HTTP 204.
      responses:
        '204':
          description: Source ACL deleted successfully.
        '404':
          description: Source ACL not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /source-groups/:
    get:
      summary: List source groups
      description: Returns all source groups belonging to the authenticated caller's service label. Allows lookup by name across service boundaries when using the `name` query parameter.
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Lookup a source group by name across service boundaries.
      responses:
        '200':
          description: A list of source groups.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SourceGroup'
    post:
      summary: Create a source group
      description: Creates a new source group. If a resource with the same `(service, name)` exists, returns the existing resource with HTTP 200.
